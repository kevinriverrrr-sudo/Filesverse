Categories:System
License:GPL-3.0-or-later
WebSite:https://github.com/nicktrix/Filesverse
SourceCode:https://github.com/nicktrix/Filesverse
IssueTracker:https://github.com/nicktrix/Filesverse/issues
Changelog:https://github.com/nicktrix/Filesverse/releases

AutoName:Filesverse
Summary:Intelligent file manager for Android

RepoType:git
Repo:https://github.com/nicktrix/Filesverse.git
Binaries:https://github.com/nicktrix/Filesverse/releases/download/v%v/Filesverse-%v-release.apk

Builds:
  - versionName: 1.0.0
    versionCode: 1
    commit: v1.0.0
    submodules: true
    sudo:
      - apt-get update || apt-get update
      - apt-get install -y openjdk-17-jdk-headless
    output: app/build/outputs/apk/release/app-release-unsigned.apk
    prebuild:
      - sed -i -e '/signingConfigs/,+6d' app/build.gradle.kts
      - sed -i -e 's/signingConfig signingConfigs.getByName("release")//'
        app/build.gradle.kts
      - export ANDROID_HOME=/opt/android-sdk
      - mkdir -p /opt/android-sdk
      - curl -o /tmp/cmdline-tools.zip
        https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
      - unzip /tmp/cmdline-tools.zip -d /opt/android-sdk
      - mv /opt/android-sdk/cmdline-tools /opt/android-sdk/cmdline-tools-latest
      - yes | /opt/android-sdk/cmdline-tools-latest/bin/sdkmanager
        --licenses || true
      - /opt/android-sdk/cmdline-tools-latest/bin/sdkmanager
        'platforms;android-35' 'build-tools;35.0.0'
    scanignore:
      - app/build/
    scandelete:
      - .gradle/
      - build/

AutoUpdateMode:Version v%v
UpdateCheckMode:Tags
CurrentVersion:1.0.0
CurrentVersionCode:1
